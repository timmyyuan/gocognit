name: Checks

on:
  push:
    branches:
      - master
  pull_request:
    branches:
      - master

jobs:
  test:
    name: ${{ matrix.os }} ${{ matrix.go-version}}
    runs-on: ${{ matrix.os }}

    strategy:
      matrix:
        os: [ubuntu-latest]
        os-version: ["stable"]
        go-version: ["1.24", "1.25", "1.26"]

    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Use Go ${{ matrix.go-version }}
        uses: actions/setup-go@v5
        with:
          go-version: ${{ matrix.go-version }}
          check-latest: true
          cache: true
      - name: Run tests
        run: go test ./...
